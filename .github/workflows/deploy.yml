name: Deploy to Aliyun Server

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  APP_DIR: /var/www/business-workbench
  GO_VERSION: '1.22'
  NODE_VERSION: '20'
  SERVICE_NAME: business-workbench
  PORT: '3001'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
    concurrency:
      group: production-deploy
      cancel-in-progress: true
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: npm
        cache-dependency-path: |
          package-lock.json
          frontend/package-lock.json

    - name: Install dependencies
      run: |
        npm ci
        npm --prefix frontend ci

    - name: Build frontend
      run: npm --prefix frontend run build

    - name: Build Go backend (linux/amd64)
      run: |
        mkdir -p dist/release/backend-go dist/release/frontend
        cd backend-go
        GOOS=linux GOARCH=amd64 go build -o ../dist/release/server ./cmd/server

    - name: Prepare release bundle
      run: |
        cp -R frontend/dist dist/release/frontend/
        if [ -d backend-go/public ]; then
          cp -R backend-go/public dist/release/backend-go/
        fi
        cp scripts/deploy/remote-deploy.sh dist/remote-deploy.sh
        chmod +x dist/remote-deploy.sh
        tar -czf dist/release.tar.gz -C dist/release .

    - name: Upload release bundle and deploy script
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SERVER_PORT || 22 }}
        source: "dist/release.tar.gz,dist/remote-deploy.sh"
        target: "/tmp/"
        strip_components: 1

    - name: Ensure server directories and shared env
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SERVER_PORT || 22 }}
        script: |
          set -e
          mkdir -p ${{ env.APP_DIR }}/shared
          mkdir -p ${{ env.APP_DIR }}/releases
          cat > ${{ env.APP_DIR }}/shared/.env << 'EOF'
          FEISHU_APP_ID=${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET=${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_REDIRECT_URI=${{ secrets.FEISHU_REDIRECT_URI }}
          FRONTEND_URL=${{ secrets.FRONTEND_URL }}
          PORT=${{ env.PORT }}
          DATABASE_PATH=data.sqlite
          DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_API_URL=${{ secrets.DEEPSEEK_API_URL }}
          DEEPSEEK_MODEL=${{ secrets.DEEPSEEK_MODEL }}
          FEISHU_PUSH_WEBHOOK=${{ secrets.FEISHU_PUSH_WEBHOOK }}
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_SECURE=${{ secrets.SMTP_SECURE }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASS=${{ secrets.SMTP_PASS }}
          SMTP_FROM=${{ secrets.SMTP_FROM }}
          CRON_TIMEZONE=Asia/Shanghai
          EOF
          chmod 600 ${{ env.APP_DIR }}/shared/.env
          if [ ! -f ${{ env.APP_DIR }}/shared/data.sqlite ] && [ -f ${{ env.APP_DIR }}/backend-go/data.sqlite ]; then
            cp ${{ env.APP_DIR }}/backend-go/data.sqlite ${{ env.APP_DIR }}/shared/data.sqlite
          fi

    - name: Run remote deployment
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SERVER_PORT || 22 }}
        script: |
          set -e
          chmod +x /tmp/remote-deploy.sh
          APP_DIR=${{ env.APP_DIR }} \
          SERVICE_NAME=${{ env.SERVICE_NAME }} \
          PORT=${{ env.PORT }} \
          RELEASE_NAME=main-${{ github.run_number }}-${{ github.sha }} \
          RELEASE_TARBALL=/tmp/release.tar.gz \
          bash /tmp/remote-deploy.sh

    - name: Verify public health endpoint
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SERVER_PORT || 22 }}
        script: |
          set -e
          curl -fsS http://127.0.0.1:${{ env.PORT }}/api/health
          sudo nginx -t
